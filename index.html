<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
      integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
      crossorigin="anonymous"
    />
    <!-- widget stuff here -->
    <script
      src="https://global.oktacdn.com/okta-signin-widget/5.1.5/js/okta-sign-in.min.js"
      type="text/javascript"
    ></script>
    <link
      href="styles.css"
      type="text/css"
      rel="stylesheet"
    />
  </head>
  <body id="home-body">
         <header>
        <nav id="navigation-bar" style="display: none">
          <div class="nav">
            <ul>
              <li><a href="">Home</a></li>
              <li><a href="">About</a></li>
              <li><a href="">Contact</a></li>
              <li>
                <a href="" id="logout" onclick="logout()">Log out</a>
              </li>
            </ul>
          </div>
        </nav>
      </header>
    
    <div class="messageBox" id="messageBox" style="display: none">
        <p id="messageBox"></p>
      </div>
    
    <div class="container">
      <!-- <div id="messageBox-Jumbotron" class="jumbotron">
        You are not logged in.
      </div> -->
      <!-- where the sign-in form will be displayed -->
      <div id="okta-login-container"></div>
    </div>
    <script type="text/javascript">
      const oktaSignIn = new OktaSignIn({
        baseUrl: "https://dev-10881290.okta.com",
        clientId: "0oa7o8ki8xMgqrmKv5d6",
        authParams: {
          issuer: "https://dev-10881290.okta.com/oauth2/default",
        },
        redirectUri:
          'https://mazdake.github.io/',
      });

      oktaSignIn.authClient.token.getUserInfo().then(
        function (user) {
          document.getElementById("messageBox").innerHTML =
            "Hello, " + user.email + "! You are *still* logged in! :)";
          document.getElementById("logout").style.display = "block";
          document.getElementById("navigation-bar").style.display = "inline-block";
          document.getElementById("messageBox").style.display = "block";
          /*document.getElementById("messageBox-Jumbotron").style.display = "none";*/
          /*document.getElementById("home-body").style.display = "none";*/
        },
        function (error) {
          oktaSignIn
            .showSignInToGetTokens({
              el: "#okta-login-container",
            })
            .then(function (tokens) {
              oktaSignIn.authClient.tokenManager.setTokens(tokens);
              oktaSignIn.remove();

              const idToken = tokens.idToken;
              document.getElementById("messageBox").innerHTML =
                "Hello, " + idToken.claims.email + "! You just logged in! :)";
              document.getElementById("logout").style.display = "block";
              document.getElementById("navigation-bar").style.display = "inline-block";
              document.getElementById("messageBox").style.display = "block";
              /*document.getElementById("messageBox-Jumbotron").style.display = "none";*/
              /*document.getElementById("home-body").style.display = "none";*/
            })
            .catch(function (err) {
              console.error(err);
            });
        }
      );

      function logout() {
        oktaSignIn.authClient.signOut();
        location.reload();
      }
    </script>
  </body>
</html>
